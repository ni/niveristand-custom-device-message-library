trigger:
  batch: true
  branches:
    include:
      - main
      - release/*

resources:
  repositories:
    - repository: niveristand-custom-device-build-tools
      type:       github
      ref:        main
      endpoint:   nivs-custom-devices
      name:       ni/niveristand-custom-device-build-tools

stages:
  - template: azure-templates/stages.yml@niveristand-custom-device-build-tools
    parameters:
      lvVersionsToBuild:
        
        - version: '2024'
          bitness: '64bit'
        - version: '2025'
          bitness: '64bit'
        - version: '2026'
          bitness: '64bit'

      buildSteps:
        - projectLocation: 'Source\Message Library.lvproj'
          buildOperation: 'ExecuteAllBuildSpecs'
          target: 'All'
          buildSpec: 'All'

      releaseVersion: '26.0.0'
      buildOutputLocation: 'Built'
      archiveLocation: '\\nirvana\Measurements\VeriStandAddons\messaging_library'

      packages:
        - controlFileName: 'control'
          payloadMaps:
            - installLocation: 'ni-paths-LV$(lvVersion)DIR$(nipkgx64suffix)\vi.lib\NI\VeriStand Custom Device Messaging'
              payloadLocation: 'VeriStand Custom Device Messaging'

  - template: azure-templates/linux-stage.yml@niveristand-custom-device-build-tools
    parameters:
      lvVersionsToBuild:
        - version: '2026'
          bitness: '64bit'

      buildSteps:
      - id: 'message_library'
        projectLocation: 'Source/Message Library.lvproj'
        buildOperation: 'ExecuteBuildSpec'
        target: 'My Computer'
        buildSpec: 'Source Distribution'

      releaseVersion: '26.0.0'
      branch: 'main'
      debugBuild: 'no'
      buildOutputLocation: 'Built'
      archiveLocation: '\\nirvana\Measurements\VeriStandAddons\messaging_library'
